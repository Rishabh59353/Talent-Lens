<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLens - AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 800px; margin: 50px auto; }
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #4e73df; border-color: #4e73df; }
        .skill-badge { margin: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-5">
            <h1 class="text-center mb-4">🎯 TalentLens</h1>
            <p class="text-center text-muted">AI Resume Analyzer - Upload your PDF and get job recommendations</p>
            
            <div class="mb-4">
                <label for="pdfFile" class="form-label">Upload PDF Resume:</label>
                <input type="file" class="form-control" id="pdfFile" accept=".pdf">
            </div>
            
            <button onclick="uploadResume()" class="btn btn-primary w-100">Analyze Resume</button>
            
            <div id="results" class="mt-5" style="display: none;">
                <h3>📋 Extracted Skills:</h3>
                <div id="skillsList"></div>
                
                <h3 class="mt-4">💼 Recommended Jobs:</h3>
                <div id="jobsList"></div>
            </div>
            
            <div id="loading" class="text-center mt-3" style="display: none;">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2">Analyzing your resume...</p>
            </div>
        </div>
    </div>
    
	<script>
	    async function uploadResume() {
	        const file = document.getElementById('pdfFile').files[0];
	        if (!file) {
	            alert('Please select a PDF file!');
	            return;
	        }

	        const formData = new FormData();
	        formData.append('pdfFile', file);

	        document.getElementById('loading').style.display = 'block';
	        document.getElementById('results').style.display = 'none';

	        try {
	            const response = await fetch('/api/resume/upload', {
	                method: 'POST',
	                body: formData
	            });

	            const data = await response.json();

	            const skillsHtml = data.skills.map(skill =>
	                '<span class="badge bg-primary skill-badge">' + skill + '</span>'
	            ).join('');

	            document.getElementById('skillsList').innerHTML = skillsHtml;

	            let jobsHtml = '';
	            data.recommendedJobs.forEach(item => {
	                jobsHtml += `
	                    <div class="card mb-3 p-3">
	                        <h5>${item.job.title}</h5>
	                        <p class="mb-1"><strong>Company:</strong> ${item.job.company}</p>
	                        <p class="mb-1"><strong>Domain:</strong> ${item.job.domain}</p>
	                        <p class="mb-1"><strong>Match Score:</strong> ${item.matchScore}%</p>
	                        <div class="progress">
	                            <div class="progress-bar bg-success" role="progressbar" 
	                                 style="width: ${item.matchScore}%;">
	                                ${item.matchScore}%
	                            </div>
	                        </div>
	                    </div>
	                `;
	            });

	            document.getElementById('jobsList').innerHTML = jobsHtml;
	            document.getElementById('results').style.display = 'block';
	            document.getElementById('loading').style.display = 'none';

	        } catch (error) {
	            alert('Error: ' + error.message);
	            document.getElementById('loading').style.display = 'none';
	        }
	    }
	</script>
</body>
</html>
